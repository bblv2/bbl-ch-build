# bbl-ch-build — non-secret cluster defaults.
#
# Read by scripts/provision.sh FIRST when assembling the cloud-init
# host.conf for a new box. Subsequent overlays apply in order:
#   1. seeds/defaults.conf            (this file)              — VCS
#   2. seeds/hosts/<short>.conf       (optional, per-host)     — VCS
#   3. /etc/bbl-ch-secrets.conf       (shared secrets)         — loose on rpt
#   4. /etc/bbl-ch-secrets.d/<short>.conf  (optional per-host) — loose on rpt
#
# Last assignment of any variable wins. Anything operator-rotatable
# (DB password, Django secret key, third-party tokens) belongs in the
# secrets file, NOT here.

# ── Source repos / refs ──────────────────────────────────────────────
BBL_DJANGO_REPO=git@github.com:bblv2/bbl-django.git
BBL_DJANGO_BRANCH=release
BBL_FRONTEND_REPO=git@github.com:bblv2/bblfrontend.git
BBL_FRONTEND_REF=prod-2026-05-03

# ── DB / Redis routing (no credentials) ──────────────────────────────
# Cluster default points at the post-migration bbl_beta database on
# db-atl. Hosts still on the pre-migration lb-atl/nodebblclean cluster
# override BBL_DB_HOST and BBL_DB_NAME in seeds/hosts/<short>.conf.
BBL_DB_HOST=db-atl.bblapp.io
BBL_DB_PORT=5432
BBL_DB_NAME=bbl_beta
BBL_DB_USER=bbldbuser
BBL_REDIS_URL=redis://lb-atl.bblapp.io:6379/0

# ── Third-party (non-secret bits) ────────────────────────────────────
BBL_STRIPE_PUBLIC_KEY=
BBL_MAILGUN_DOMAIN=
BBL_CERT_EMAIL=ops@brandedbridgeline.com

# ── Gunicorn / celery ────────────────────────────────────────────────
BBL_GUNICORN_BIND=127.0.0.1:8001
BBL_GUNICORN_WORKERS=4
BBL_RUN_BEAT=false

# ── Misc ─────────────────────────────────────────────────────────────
BBL_DOMAIN_ALIASES=
BBL_DEBUG_SWITCHBOARD=true
