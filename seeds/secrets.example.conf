# bbl-ch-build — secrets template. Copy to /etc/bbl-ch-secrets.conf
# (mode 0600) on rpt and fill in real values.
#
# This file is the ONLY rpt-side loose file the provisioner reads
# (apart from optional /etc/bbl-ch-secrets.d/<short>.conf for per-host
# secret overrides — see below). It is the second cliff after losing
# rpt's git checkouts; back it up to your password vault.
#
# Anything non-secret belongs in seeds/defaults.conf or
# seeds/hosts/<short>.conf, NOT here.

# ── Django runtime secrets ──────────────────────────────────────────
# Cluster default. Per-host overrides (e.g. the legacy bbl26 cluster
# at ch-atl5/6/7, ch1-test, ch-test-2) live in
# /etc/bbl-ch-secrets.d/<short>.conf.
BBL_DJANGO_SECRET_KEY=

# DB / Redis credentials. DB host/name/user/port stay in defaults.conf;
# only the password lives here.
BBL_DB_PASSWORD=

# Stripe — V3 secret key + (optional) webhook signing secret.
BBL_STRIPE_SECRET_KEY=
BBL_STRIPE_WEBHOOK_SECRET=

# Mailgun API key (domain stays in defaults.conf).
BBL_MAILGUN_API_KEY=

# Telnyx V1 credentials (USER+TOKEN pair) and V2 bearer key.
BBL_TELNYX_USER=
BBL_TELNYX_TOKEN=
BBL_TELNYX_API_KEY=

# Optional integrations.
BBL_BUGCATCHER_DSN=
BBL_MONITOR_TOKEN=

# ── /call-trace dual-write ──────────────────────────────────────────
# rpt-side Redis URL for the bbl:trace stream consumed by bbl-monitor
# /call-trace. Contains the rpt redis password, so it lives here.
# Empty / unset = dual-write disabled (relay-side events still reach
# the stream from esl_outbound, but XML won't render in the timeline
# because there's no django-side counterpart).
BBL_REDIS_TRACE_URL=redis://:PASSWORD@45.79.211.163:6379/0
